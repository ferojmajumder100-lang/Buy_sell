<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Portal - DGD BUY SELL</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #000;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .portal-container {
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            background: #0d0d0d;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
        }

        .portal-container::before {
            content: '';
            position: absolute;
            height: 400%; width: 400%;
            background: conic-gradient(#ff0000, #ff00cc, #3333ff, #00ff88, #ffcc00, #ff0000);
            animation: rotateGlow 3s linear infinite;
            left: -150%; top: -150%;
            z-index: 1;
        }

        .portal-container::after {
            content: '';
            position: absolute;
            background: #0d0d0d;
            inset: 5px;
            border-radius: 26px;
            z-index: 2;
        }

        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }

        .content { position: relative; z-index: 10; display: flex; flex-direction: column; gap: 25px; }

        .rgb-text {
            background: linear-gradient(90deg, #ff0000, #00d2ff, #ff00cc, #00ff88, #ffcc00, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveShine 2s linear infinite;
            font-weight: 900;
        }

        @keyframes moveShine { to { background-position: 200% center; } }

        .main-title { font-size: 30px; margin: 0; text-transform: uppercase; }
        .sub-title { font-size: 16px; color: #ccc; margin: -10px 0 10px; }

        .btn-action, .btn-get, .btn-copy {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; }
        .btn-get { background: linear-gradient(45deg, #00ff88, #ffcc00); color: black; }
        .btn-copy { background: linear-gradient(45deg, #00d2ff, #3333ff); color: white; }

        #passwordArea, #copyArea { display: none; flex-direction: column; gap: 15px; }

        .input-box {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        #errorMsg { color: #ff4d4d; display: none; font-size: 14px; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="content">
            <span class="rgb-text main-title">UNLIMITED FB CREATE</span>
            <span class="sub-title">নিচের বাটনে চাপ দিন</span>
            
            <button class="btn-action" id="showPassBtn" onclick="showPasswordArea()">প্রবেশ করুন</button>
            
            <div id="passwordArea">
                <input type="password" class="input-box" id="passInput" placeholder="পাসওয়ার্ড দিন...">
                <p id="errorMsg">❌ ভুল পাসওয়ার্ড!</p>
                <button class="btn-get" onclick="checkPassword()">GET LINK</button>
            </div>

            <div id="copyArea">
                <span class="rgb-text">লিঙ্কটি কপি করুন:</span>
                <input type="text" class="input-box" id="linkToCopy" value="https://www.mediafire.com/file/hqqnt2jo8iksq6o/Project+8+[6D650A1].mp4/file" readonly>
                <button class="btn-copy" id="copyBtn" onclick="copyText()">COPY LINK</button>
            </div>
            
            <div class="footer">DGD BUY SELL • Powered by ARAFAT</div>
        </div>
    </div>

    <script>
        function showPasswordArea() {
            document.getElementById('showPassBtn').style.display = 'none';
            document.getElementById('passwordArea').style.display = 'flex';
        }

        function checkPassword() {
            const userInput = document.getElementById('passInput').value;
            const correctPass = 'arafat1231';
            if (userInput === correctPass) {
                document.getElementById('passwordArea').style.display = 'none';
                document.getElementById('copyArea').style.display = 'flex';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function copyText() {
            const copyInput = document.getElementById('linkToCopy');
            const copyBtn = document.getElementById('copyBtn');

            // সব ধরণের ফোনের জন্য কার্যকরী কপি পদ্ধতি
            copyInput.select();
            copyInput.setSelectionRange(0, 99999); // মোবাইল সাপোর্ট

            try {
                document.execCommand('copy');
                copyBtn.innerText = 'COPIED! ✅';
                copyBtn.style.background = 'linear-gradient(45deg, #00ff88, #009944)';
            } catch (err) {
                // বিকল্প পদ্ধতি যদি execCommand ব্যর্থ হয়
                navigator.clipboard.writeText(copyInput.value);
                copyBtn.innerText = 'COPIED! ✅';
            }

            setTimeout(() => {
                copyBtn.innerText = 'COPY LINK';
                copyBtn.style.background = 'linear-gradient(45deg, #00d2ff, #3333ff)';
            }, 2000);
        }
    </script>
</body>
</html>
