<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DGD BUY SELL - RGB Notice</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* প্রিমিয়াম ঝিকিমিকি বর্ডার কার্ড */
        .notice-container {
            width: 100%;
            max-width: 360px;
            padding: 35px 25px;
            background: #0d0d0d;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        /* রঙিন সাপের মতো ঘুরন্ত বর্ডার */
        .notice-container::before {
            content: '';
            position: absolute;
            height: 400%; width: 400%;
            background: conic-gradient(
                #ff0000, #ff00cc, #3333ff, #00ff88, #ffcc00, #ff0000
            );
            animation: rotateGlow 3s linear infinite;
            left: -150%; top: -150%;
            z-index: 1;
        }

        .notice-container::after {
            content: '';
            position: absolute;
            background: #0d0d0d;
            inset: 4px;
            border-radius: 22px;
            z-index: 2;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        .content { position: relative; z-index: 10; }

        /* সব লেখার জন্য কমন ঝিকিমিকি এনিমেশন */
        .rgb-text {
            background: linear-gradient(90deg, #ff0000, #ff00cc, #3333ff, #00ff88, #ffcc00, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveShine 2s linear infinite;
            font-weight: 900;
            display: block;
        }

        /* RECEIVED OFF লেখাটি বড় */
        .title {
            font-size: 32px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 204, 0.6));
        }

        /* মাঝখানের মেসেজগুলো */
        .message {
            font-size: 17px;
            line-height: 1.4;
            margin: 10px 0;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.5));
        }

        /* টেনশন করবেন না - এই পার্টটি একটু আলাদা কালার গ্লো দিবে */
        .safe-text {
            font-size: 19px;
            margin: 15px 0;
            color: #00ff88;
            filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.8));
        }

        /* নিচের সতর্কবার্তা */
        .warning {
            font-size: 20px;
            margin-top: 20px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 12px rgba(255, 204, 0, 0.8));
        }

        @keyframes moveShine {
            to { background-position: 200% center; }
        }

        .footer-name {
            margin-top: 30px;
            font-size: 13px;
            color: #ffcc00;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.6);
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="notice-container">
        <div class="content">
            <span class="rgb-text title">RECEIVED OFF</span>
            
            <span class="rgb-text message">আজকের জন্য আইডি নেওয়া বন্ধ করা হয়েছে।</span>
            <span class="rgb-text message">দয়া করে আজকে আর কেউ ফাইল দেবেন না।</span>
            
            <hr style="border: 0; border-top: 1px dashed #444; margin: 15px 0;">

            <span class="rgb-text safe-text">সবার আইডি রিসিভ করা হয়েছে,</span>
            <span class="rgb-text message">কেউ কোনো টেনশন করবেন না। ইনশাআল্লাহ্ সব ঠিক আছে।</span>
            
            <span class="rgb-text warning">এখন আর রিসিভ হবে না!</span>
            
            <div class="footer-name">
                DGD BUY SELL • Powered by ARAFAT
            </div>
        </div>
    </div>

</body>
</html>
